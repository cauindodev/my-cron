name: Cron Job
on:
  schedule:
    - cron: '0 * * * *'
    - cron: '5 * * * *'
    - cron: '10 * * * *'
    - cron: '15 * * * *'
    - cron: '20 * * * *'
    - cron: '25 * * * *'
    - cron: '30 * * * *'
    - cron: '35 * * * *'
    - cron: '40 * * * *'
    - cron: '45 * * * *'
    - cron: '50 * * * *'
    - cron: '55 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Chrome
        run: sudo apt-get install -y chromium-browser

      - name: Call URL 5 times
        shell: bash
        run: |
          set +e
          for i in 1 2 3 4 5; do
            echo "=== Lần $i - $(date) ==="
            chromium-browser --headless --no-sandbox --disable-gpu \
              --dump-dom "https://aitrend.great-site.net/cron_thoisu.php" 2>&1 | tail -30
            echo "=== Xong lần $i ==="
            [ $i -lt 5 ] && sleep 55
          done
          exit 0
