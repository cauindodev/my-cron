name: Cron Job
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Chrome & dependencies
        run: |
          sudo apt-get install -y chromium-browser

      - name: Call URL with real browser
        run: |
          for i in 1 2 3 4 5; do
            chromium-browser --headless --no-sandbox --disable-gpu \
              --dump-dom "https://aitrend.great-site.net/cron_thoisu.php" > /dev/null 2>&1 || true
            sleep 60
          done
