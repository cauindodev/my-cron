name: Cron Job
on:
  schedule:
    - cron: '0 * * * *'    # backup: chạy mỗi giờ phòng khi chain bị đứt
    - cron: '*/5 * * * *'  # cố gắng mỗi 5 phút
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Install Chrome
        run: sudo apt-get install -y chromium-browser

      - name: Call URL 5 times (mỗi phút 1 lần)
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Lần $i - $(date) ==="
            chromium-browser --headless --no-sandbox --disable-gpu \
              --dump-dom "https://aitrend.great-site.net/cron_thoisu.php" 2>&1 | tail -20
            echo "=== Xong lần $i ==="
            [ $i -lt 5 ] && sleep 55
          done
